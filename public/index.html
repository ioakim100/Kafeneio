<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Kafeneío POS</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;background:#141210;-webkit-tap-highlight-color:transparent}
  #root{min-height:100vh}
  .flex{display:flex}.ac{align-items:center}.jb{justify-content:space-between}.wrap{flex-wrap:wrap}
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#3C332C;border-radius:8px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

/* ---------- tokens ---------- */
const C = { ink:"#141210", panel:"#1F1B18", panel2:"#2A2420", panel3:"#332C26", line:"#3C332C",
  paper:"#F4ECDD", paperLine:"#CDBE9F", amber:"#E8A23D", amberDim:"#7A5A24", green:"#7BC49A",
  red:"#D8735E", text:"#F2E9DB", mute:"#A2917C", subtle:"#6E6156", plan:"#191512" };
const MONO='ui-monospace, "SF Mono", Menlo, Consolas, monospace';
const SANS='ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif';
const euro=(n)=>"€"+(Number(n)||0).toFixed(2);
const round2=(n)=>Math.round(n*100)/100;
const orderTotal=(o)=>round2((o?.items||[]).reduce((s,x)=>s+x.price*x.qty,0));
const paidSum=(o)=>round2((o?.payments||[]).reduce((s,x)=>s+x.amount,0));
const dayKey=(d)=>{const x=new Date(d);return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`;};
const relTime=(iso,now)=>{if(!iso)return"";const s=Math.max(0,Math.floor((now-new Date(iso).getTime())/1000));if(s<60)return"just now";const m=Math.floor(s/60);if(m<60)return m+" min";return Math.floor(m/60)+"h "+(m%60)+"m";};

/* ---------- icons ---------- */
const PATHS={ coffee:"M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4z",
  grid:"M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z",
  list:"M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01",
  chef:"M6 3v18M6 9c-2 0-3-1-3-3V3M9 6c0 2-1 3-3 3M15 3c-2 1-3 3-3 6 0 2 1 3 3 3v9",
  chart:"M18 20V10M12 20V4M6 20v-6", sliders:"M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6",
  plus:"M12 5v14M5 12h14", minus:"M5 12h14", x:"M18 6 6 18M6 6l12 12", check:"M20 6 9 17l-5-5",
  trash:"M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14", printer:"M6 9V2h12v7M6 18H4v-6h16v6h-2M8 14h8v6H8z",
  back:"M19 12H5M12 19l-7-7 7-7", left:"M15 18l-6-6 6-6", right:"M9 18l6-6-6-6",
  move:"M12 2v20M2 12h20M5 9 2 12l3 3M19 9l3 3-3 3M9 5l3-3 3 3M9 19l3 3 3-3",
  clock:"M12 22a10 10 0 100-20 10 10 0 000 20zM12 6v6l4 2", send:"M22 2 11 13M22 2l-7 20-4-9-9-4z",
  card:"M2 7h20v10H2zM2 11h20", cash:"M2 6h20v12H2zM12 15a3 3 0 100-6 3 3 0 000 6z",
  pin:"M12 21s7-6 7-11a7 7 0 10-14 0c0 5 7 11 7 11zM12 10a1 1 0 100-2 1 1 0 000 2z",
  users:"M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8z", logout:"M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" };
function Ico({n,size=18,color="currentColor"}){return(<svg width={size} height={size} viewBox="0 0 24 24" fill="none"
  stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={PATHS[n]}/></svg>);}

/* ---------- server bridge ---------- */
let WAITER=null;
async function act(type,payload){
  const r=await fetch("/api/action",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type,payload,waiterId:WAITER&&WAITER.id})});
  return r.json();
}

/* ================= app ================= */
function App(){
  const [state,setState]=useState(null);
  const [waiter,setWaiter]=useState(()=>{try{return JSON.parse(localStorage.getItem("waiter"));}catch{return null;}});
  const [view,setView]=useState("floor");
  const [now,setNow]=useState(Date.now());
  const [floorId,setFloorId]=useState(null);
  const [arrange,setArrange]=useState(false);
  const [activeId,setActiveId]=useState(null);
  const [payId,setPayId]=useState(null);
  const [receipt,setReceipt]=useState(null);

  useEffect(()=>{WAITER=waiter;},[waiter]);
  useEffect(()=>{const i=setInterval(()=>setNow(Date.now()),20000);return()=>clearInterval(i);},[]);
  useEffect(()=>{
    const es=new EventSource("/api/events");
    es.onmessage=(e)=>{const s=JSON.parse(e.data);setState(s);setFloorId((f)=>f||(s.floors[0]&&s.floors[0].id));};
    es.onerror=()=>{};
    return()=>es.close();
  },[]);

  // when a table we are paying gets closed on the server, show its receipt
  const prevOpen=useRef({});
  useEffect(()=>{
    if(!state)return;
    if(payId && !state.open[payId]){ // closed elsewhere/after final payment handled by doPay result normally
    }
    prevOpen.current=state.open;
  },[state,payId]);

  if(!state) return <Center><div style={{color:C.mute}}>Connecting…</div></Center>;
  if(!waiter) return <Login waiters={state.waiters} onLogin={(w)=>{localStorage.setItem("waiter",JSON.stringify(w));setWaiter(w);}}/>;

  const open=state.open, tables=state.tables, floors=state.floors;
  const floorTables=tables.filter((t)=>t.floorId===floorId);
  const active=activeId?tables.find((t)=>t.id===activeId):null;
  const activeOrder=activeId?open[activeId]:null;
  const payTable=payId?tables.find((t)=>t.id===payId):null;
  const payOrder=payId?open[payId]:null;

  const openReceiptFrom=(res,fallback)=>{
    const print=res&&res.print;
    setReceipt({...fallback,print});
  };
  const sendKitchen=async(t)=>{const o=open[t.id];const res=await act("sendKitchen",{tableId:t.id});
    openReceiptFrom(res,{isKitchen:true,tableName:t.name,servedBy:waiter.name,
      items:(o.items||[]).filter((x)=>x.station==="kitchen")});};
  const printBill=async(t)=>{const o=open[t.id];const res=await act("printBill",{tableId:t.id});
    openReceiptFrom(res,{isKitchen:false,tableName:t.name,servedBy:waiter.name,items:o.items,
      total:orderTotal(o),payments:o.payments||[]});};
  const doPay=async(amount,method)=>{
    const res=await act("pay",{tableId:payId,amount,method});
    if(res.sale){ setPayId(null); setReceipt({isKitchen:false,tableName:res.sale.tableName,
      servedBy:(state.waiters.find(w=>w.id===res.sale.waiterId)||{}).name,items:res.sale.items,
      total:res.sale.total,payments:res.sale.payments,method:res.sale.method,print:res.print}); }
  };

  return (
    <div style={{background:C.ink,minHeight:"100vh",color:C.text,fontFamily:SANS,maxWidth:1100,margin:"0 auto",position:"relative"}}>
      <TopBar view={view} setView={setView} waiter={waiter} openCount={Object.keys(open).length}
        onLogout={()=>{localStorage.removeItem("waiter");setWaiter(null);}}/>
      <div style={{padding:16}}>
        {view==="floor"&&<Floor floors={floors} floorId={floorId} setFloorId={setFloorId} tables={floorTables}
          open={open} arrange={arrange} setArrange={setArrange} now={now} floorIdForAdd={floorId}
          onPick={(t)=>setActiveId(t.id)} />}
        {view==="orders"&&<Orders open={open} tables={tables} floors={floors} now={now} onPick={(t)=>setActiveId(t.id)}/>}
        {view==="kitchen"&&<Kitchen open={open} tables={tables} floors={floors} now={now}/>}
        {view==="reports"&&<Reports sales={state.sales} waiters={state.waiters}/>}
        {view==="setup"&&<Setup state={state}/>}
      </div>

      {active&&<OrderScreen table={active} order={activeOrder} menu={state.menu} waiters={state.waiters}
        onAdd={(m)=>act("addItem",{tableId:active.id,item:{id:m.id,name:m.name,price:m.price,station:m.station}})}
        onQty={(i,d)=>act("changeQty",{tableId:active.id,index:i,delta:d})}
        onRemove={(i)=>act("removeItem",{tableId:active.id,index:i})}
        onClose={()=>setActiveId(null)} onKitchen={()=>sendKitchen(active)} onBill={()=>printBill(active)}
        onPay={()=>setPayId(active.id)} />}

      {payTable&&payOrder&&<PayModal name={payTable.name} order={payOrder}
        onAdd={doPay} onCancel={()=>setPayId(null)}/>}

      {receipt&&<Receipt data={receipt} onClose={()=>setReceipt(null)}/>}
    </div>
  );
}

/* ---------- login ---------- */
function Login({waiters,onLogin}){
  const [sel,setSel]=useState(null);
  const [pin,setPin]=useState("");
  const [err,setErr]=useState("");
  const submit=async(name,p)=>{
    const r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,pin:p})});
    if(r.ok){onLogin((await r.json()).waiter);}else{setErr("Wrong PIN");}
  };
  return (
    <Center>
      <div style={{width:320,textAlign:"center"}}>
        <div style={{width:52,height:52,borderRadius:14,background:C.amber,display:"grid",placeItems:"center",margin:"0 auto 16px"}}>
          <Ico n="coffee" size={28} color={C.ink}/>
        </div>
        <div style={{fontWeight:800,fontSize:20}}>Kafeneío POS</div>
        <div style={{color:C.mute,fontSize:13,margin:"4px 0 22px"}}>Who's on shift?</div>
        {!sel? (
          <div style={{display:"grid",gap:8}}>
            {waiters.map((w)=>(
              <button key={w.id} onClick={()=>{setErr("");setSel(w);submit(w.name,"").catch(()=>{});}}
                className="flex ac" style={{gap:12,background:C.panel,border:`1px solid ${C.line}`,borderRadius:12,padding:"14px 16px",color:C.text}}>
                <span style={{width:12,height:12,borderRadius:12,background:w.color}}/>
                <span style={{fontWeight:700,fontSize:15}}>{w.name}</span>
              </button>
            ))}
            {waiters.length===0&&<div style={{color:C.subtle,fontSize:13}}>Add waiters under Setup on the shop tablet first.</div>}
          </div>
        ):(
          <div style={{display:"grid",gap:10}}>
            <div className="flex ac" style={{gap:12,justifyContent:"center"}}>
              <span style={{width:12,height:12,borderRadius:12,background:sel.color}}/>
              <span style={{fontWeight:700}}>{sel.name}</span>
            </div>
            <div style={{color:C.mute,fontSize:12}}>Enter PIN (if set)</div>
            <input autoFocus type="password" inputMode="numeric" value={pin} onChange={(e)=>setPin(e.target.value)}
              style={{...INP,textAlign:"center",fontSize:20,letterSpacing:4}}/>
            {err&&<div style={{color:C.red,fontSize:12}}>{err}</div>}
            <button onClick={()=>submit(sel.name,pin)} style={{...BIG,background:C.amber,color:C.ink,border:"none",fontWeight:800}}>Start shift</button>
            <button onClick={()=>{setSel(null);setPin("");setErr("");}} style={{...BIG,background:"transparent",border:`1px solid ${C.line}`,color:C.mute}}>Back</button>
          </div>
        )}
      </div>
    </Center>
  );
}

/* ---------- top bar ---------- */
function TopBar({view,setView,waiter,openCount,onLogout}){
  const tabs=[["floor","Floor","grid"],["orders","All orders","list"],["kitchen","Kitchen","chef"],["reports","Reports","chart"],["setup","Setup","sliders"]];
  return(
    <div style={{position:"sticky",top:0,zIndex:5,background:C.panel,borderBottom:`1px solid ${C.line}`}}>
      <div className="flex ac" style={{gap:10,padding:"12px 14px 6px"}}>
        <div style={{width:28,height:28,borderRadius:8,background:C.amber,display:"grid",placeItems:"center"}}><Ico n="coffee" size={16} color={C.ink}/></div>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:15}}>Kafeneío POS</div>
          <div style={{fontSize:10.5,color:C.mute,fontFamily:MONO,letterSpacing:1}}>{dayKey(new Date())}{openCount?` · ${openCount} open`:""}</div>
        </div>
        <button onClick={onLogout} className="flex ac" style={{gap:7,background:C.panel2,border:`1px solid ${C.line}`,borderRadius:20,padding:"6px 12px",color:C.text}}>
          <span style={{width:9,height:9,borderRadius:9,background:waiter.color}}/>
          <span style={{fontSize:12.5,fontWeight:700}}>{waiter.name}</span>
          <Ico n="logout" size={13} color={C.mute}/>
        </button>
      </div>
      <div className="flex" style={{gap:2,padding:"4px 6px 0",overflowX:"auto"}}>
        {tabs.map(([id,label,icon])=>{const on=view===id;return(
          <button key={id} onClick={()=>setView(id)} className="flex ac" style={{gap:6,padding:"9px 12px",border:"none",background:"transparent",
            color:on?C.amber:C.mute,fontWeight:on?700:500,fontSize:13,borderBottom:`2px solid ${on?C.amber:"transparent"}`,whiteSpace:"nowrap"}}>
            <Ico n={icon} size={15}/> {label}
          </button>);})}
      </div>
    </div>
  );
}

/* ---------- floor ---------- */
function Floor({floors,floorId,setFloorId,tables,open,arrange,setArrange,now,onPick,floorIdForAdd}){
  return(
    <div>
      <div className="flex ac jb wrap" style={{gap:10,marginBottom:12}}>
        <div className="flex wrap" style={{gap:6}}>
          {floors.map((f)=>(
            <button key={f.id} onClick={()=>setFloorId(f.id)} style={{padding:"7px 14px",borderRadius:20,fontSize:13,fontWeight:floorId===f.id?700:500,
              border:`1px solid ${floorId===f.id?C.amber:C.line}`,background:floorId===f.id?C.amber:"transparent",color:floorId===f.id?C.ink:C.mute}}>{f.name}</button>
          ))}
        </div>
        <div className="flex" style={{gap:8}}>
          {arrange&&<button onClick={()=>act("addTable",{floorId:floorIdForAdd,name:"T"+(tables.length+1),seats:4,x:50,y:50})}
            className="flex ac" style={{gap:6,...SMALL,background:C.panel3,color:C.text}}><Ico n="plus" size={15}/> Add table</button>}
          <button onClick={()=>setArrange(!arrange)} className="flex ac" style={{gap:6,...SMALL,background:arrange?C.amber:C.panel3,color:arrange?C.ink:C.text,fontWeight:700}}>
            {arrange?<React.Fragment><Ico n="check" size={15}/> Done</React.Fragment>:<React.Fragment><Ico n="move" size={15}/> Arrange</React.Fragment>}
          </button>
        </div>
      </div>
      {arrange&&<div style={{fontSize:12.5,color:C.mute,marginBottom:10}}>Drag tables to match your real layout. Tap the red dot to remove one.</div>}
      <FloorPlan tables={tables} arrange={arrange} open={open} now={now} onPick={onPick}/>
    </div>
  );
}
function FloorPlan({tables,arrange,open,now,onPick}){
  const ref=useRef(null),drag=useRef(null);
  const [local,setLocal]=useState({}); // id -> {x,y} while dragging
  const pct=(e)=>{const r=ref.current.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*100,y:(e.clientY-r.top)/r.height*100};};
  const down=(e,t)=>{if(!arrange)return;e.currentTarget.setPointerCapture(e.pointerId);const p=pct(e);drag.current={id:t.id,dx:t.x-p.x,dy:t.y-p.y,moved:false};};
  const move=(e)=>{if(!drag.current)return;const p=pct(e);let x=Math.max(7,Math.min(93,p.x+drag.current.dx)),y=Math.max(10,Math.min(90,p.y+drag.current.dy));drag.current.moved=true;setLocal((l)=>({...l,[drag.current.id]:{x,y}}));};
  const up=()=>{if(drag.current){const d=drag.current;drag.current=null;if(d.moved){const pos=local[d.id];if(pos){act("moveTable",{tableId:d.id,x:pos.x,y:pos.y});}}}};
  return(
    <div ref={ref} style={{position:"relative",width:"100%",height:480,borderRadius:16,
      background:`radial-gradient(circle at 1px 1px, ${C.line} 1px, transparent 0) 0 0 / 26px 26px, ${C.plan}`,
      border:`1px solid ${C.line}`,overflow:"hidden",touchAction:arrange?"none":"auto"}}>
      {tables.length===0&&<div style={{position:"absolute",inset:0,display:"grid",placeItems:"center",color:C.subtle,fontSize:13}}>No tables on this floor.</div>}
      {tables.map((t)=>{const o=open[t.id];const busy=o&&o.items.length>0;const size=t.shape==="round"?58:78;
        const pos=local[t.id]||{x:t.x,y:t.y};
        return(
          <div key={t.id} onPointerDown={(e)=>down(e,t)} onPointerMove={move} onPointerUp={up} onPointerCancel={up}
            onClick={()=>{if(!arrange)onPick(t);}}
            style={{position:"absolute",left:pos.x+"%",top:pos.y+"%",transform:"translate(-50%,-50%)",width:size,height:size,
              borderRadius:t.shape==="round"?"50%":14,background:busy?C.panel2:C.panel,border:`2px solid ${busy?C.amber:C.line}`,
              display:"grid",placeItems:"center",cursor:arrange?"grab":"pointer",userSelect:"none",
              boxShadow:busy?"0 0 0 4px rgba(232,162,61,.12)":"none",touchAction:arrange?"none":"auto"}}>
            <div style={{fontWeight:800,fontSize:14,lineHeight:1}}>{t.name}</div>
            {busy?<div style={{fontFamily:MONO,fontSize:12,color:C.amber,marginTop:3}}>{euro(orderTotal(o))}</div>
                 :<div style={{fontSize:10.5,color:C.subtle,marginTop:3}}>{t.seats}p</div>}
            {busy&&!arrange&&<div style={{position:"absolute",top:-6,right:-6,background:C.amber,color:C.ink,fontSize:10,fontWeight:800,borderRadius:10,padding:"1px 5px",fontFamily:MONO}}>{relTime(o.openedAt,now)}</div>}
            {arrange&&<div onPointerDown={(e)=>e.stopPropagation()} onClick={(e)=>{e.stopPropagation();act("deleteTable",{id:t.id});}}
              style={{position:"absolute",top:-8,right:-8,width:20,height:20,borderRadius:10,background:C.red,display:"grid",placeItems:"center"}}><Ico n="x" size={12} color={C.ink}/></div>}
          </div>
        );})}
    </div>
  );
}

/* ---------- all orders ---------- */
function Orders({open,tables,floors,now,onPick}){
  const list=Object.entries(open).map(([tid,o])=>{const t=tables.find((x)=>x.id===tid);const f=floors.find((x)=>x.id===(t&&t.floorId));
    return{tid,t,floor:f&&f.name,o};}).filter((r)=>r.o.items.length).sort((a,b)=>new Date(a.o.openedAt)-new Date(b.o.openedAt));
  return(
    <div>
      <Title>All open orders</Title>
      <P>Every table in service — food and drinks together, with running totals. Tap to edit.</P>
      {list.length===0?<Empty>No tables are open right now.</Empty>:(
        <div style={{display:"grid",gap:12,gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))"}}>
          {list.map((r)=>{const total=orderTotal(r.o);const paid=paidSum(r.o);return(
            <button key={r.tid} onClick={()=>onPick(r.t)} style={{textAlign:"left",background:C.panel,border:`1px solid ${C.line}`,borderRadius:14,padding:14,color:C.text}}>
              <div className="flex ac jb"><span style={{fontWeight:800,fontSize:17}}>{r.t.name}</span>
                <span className="flex ac" style={{gap:4,fontSize:11,color:C.mute,fontFamily:MONO}}><Ico n="clock" size={11}/> {relTime(r.o.openedAt,now)}</span></div>
              <div style={{fontSize:11,color:C.subtle,marginTop:2}}>{r.floor}</div>
              <div style={{margin:"10px 0",borderTop:`1px solid ${C.line}`}}/>
              {r.o.items.map((x,i)=>(<div key={i} className="flex ac" style={{gap:7,padding:"3px 0",fontSize:13}}>
                <Dot s={x.station}/><span style={{fontFamily:MONO,color:C.mute,width:22}}>{x.qty}×</span>
                <span style={{flex:1}}>{x.name}</span><span style={{fontFamily:MONO,color:C.mute,fontSize:12}}>{euro(x.price*x.qty)}</span></div>))}
              <div className="flex ac" style={{margin:"10px 0 0",borderTop:`1px dashed ${C.line}`,paddingTop:8}}>
                <span style={{flex:1,fontSize:12,color:C.mute}}>{paid>0?`Paid ${euro(paid)} · left`:"Total"}</span>
                <span style={{fontFamily:MONO,fontSize:18,fontWeight:800,color:C.amber}}>{euro(total-paid)}</span></div>
            </button>);})}
        </div>
      )}
    </div>
  );
}

/* ---------- kitchen ---------- */
function Kitchen({open,tables,floors,now}){
  const tickets=Object.entries(open).map(([tid,o])=>{const t=tables.find((x)=>x.id===tid);const f=floors.find((x)=>x.id===(t&&t.floorId));
    return{tid,name:t&&t.name,floor:f&&f.name,openedAt:o.openedAt,bumped:o.bumped,items:o.items.filter((x)=>x.station==="kitchen")};})
    .filter((t)=>t.items.length&&!t.bumped).sort((a,b)=>new Date(a.openedAt)-new Date(b.openedAt));
  return(
    <div>
      <Title>Kitchen display</Title>
      <P>Only kitchen items appear here. Bump a ticket when the food is up.</P>
      {tickets.length===0?<Empty>No open kitchen tickets.</Empty>:(
        <div style={{display:"grid",gap:12,gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))"}}>
          {tickets.map((t)=>(
            <div key={t.tid} style={{background:C.paper,borderRadius:12,padding:14,color:"#2A231A",fontFamily:MONO,boxShadow:`0 2px 0 ${C.paperLine}`}}>
              <div className="flex ac jb" style={{borderBottom:`1.5px dashed ${C.paperLine}`,paddingBottom:8}}>
                <div><div style={{fontWeight:800,fontSize:16,fontFamily:SANS}}>{t.name}</div><div style={{fontSize:10.5}}>{t.floor} · {relTime(t.openedAt,now)}</div></div>
                <Ico n="chef" size={16} color="#2A231A"/></div>

        </div>

          <span style={{fontFamily:MONO,color:C.mute}}>€</span>
          <input type="number" inputMode="decimal" value={amount} onChange={(e)=>setAmount(e.target.value)} style={{...INP,flex:1,fontFamily:MONO,fontSize:18}}/>
        </div>
        <div className="flex" style={{gap:8,marginBottom:14}}>

/* ---------- reports ---------- */
function Reports({sales,waiters}){
  const [month,setMonth]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const [sel,setSel]=useState(()=>dayKey(new Date()));
  const byDay=useMemo(()=>{const map={};sales.forEach((s)=>{const k=dayKey(s.closedAt);(map[k]=map[k]||[]).push(s);});return map;},[sales]);
  const day=byDay[sel]||[];
  const dayTotal=day.reduce((s,x)=>s+x.total,0);
  const pm=(m)=>day.flatMap((s)=>s.payments||[{amount:s.total,method:s.method}]).filter((p)=>p.method===m).reduce((s,p)=>s+p.amount,0);
  const cash=round2(pm("cash")),card=round2(pm("card"));
  const products=useMemo(()=>{const map={};day.forEach((s)=>s.items.forEach((it)=>{const e=map[it.name]||{name:it.name,qty:0,rev:0};e.qty+=it.qty;e.rev+=it.price*it.qty;map[it.name]=e;}));return Object.values(map).sort((a,b)=>b.rev-a.rev);},[day]);
  const byWaiter=useMemo(()=>{const map={};day.forEach((s)=>{const w=(waiters.find((w)=>w.id===s.waiterId)||{}).name||"—";map[w]=(map[w]||0)+s.total;});return Object.entries(map).sort((a,b)=>b[1]-a[1]);},[day,waiters]);
  const first=new Date(month.y,month.m,1);const startDow=(first.getDay()+6)%7;const days=new Date(month.y,month.m+1,0).getDate();
  const cells=[];for(let i=0;i<startDow;i++)cells.push(null);for(let d=1;d<=days;d++)cells.push(d);
  const shift=(dir)=>setMonth((p)=>{let m=p.m+dir,y=p.y;if(m<0){m=11;y--;}if(m>11){m=0;y++;}return{y,m};});
  return(
    <div>
      <Title>Daily takings</Title>
      <div style={{display:"grid",gap:16,gridTemplateColumns:"minmax(250px,1fr) minmax(270px,1.1fr)",alignItems:"start",marginTop:12}}>
        <div style={{background:C.panel,borderRadius:14,border:`1px solid ${C.line}`,padding:14}}>
          <div className="flex ac jb" style={{marginBottom:12}}><button onClick={()=>shift(-1)} style={ICON}><Ico n="left" size={18}/></button>
            <span style={{fontWeight:700,fontSize:14}}>{first.toLocaleString("en-US",{month:"long",year:"numeric"})}</span>
            <button onClick={()=>shift(1)} style={ICON}><Ico n="right" size={18}/></button></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,fontSize:10.5,color:C.subtle,marginBottom:4,fontFamily:MONO}}>{["M","T","W","T","F","S","S"].map((d,i)=><div key={i} style={{textAlign:"center"}}>{d}</div>)}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>{cells.map((d,i)=>{if(!d)return<div key={i}/>;
            const k=`${month.y}-${String(month.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;const tot=(byDay[k]||[]).reduce((s,x)=>s+x.total,0);const on=sel===k;const today=k===dayKey(new Date());
            return(<button key={i} onClick={()=>setSel(k)} style={{aspectRatio:"1",borderRadius:8,position:"relative",border:`1px solid ${on?C.amber:today?C.amberDim:"transparent"}`,
              background:on?C.amber:tot>0?C.panel2:"transparent",color:on?C.ink:C.text,display:"grid",placeItems:"center",padding:0}}>
              <span style={{fontSize:12.5,fontFamily:MONO,fontWeight:on?800:500}}>{d}</span>
              {tot>0&&<span style={{position:"absolute",bottom:3,width:4,height:4,borderRadius:4,background:on?C.ink:C.green}}/>}</button>);})}</div>
        </div>
        <div style={{background:C.paper,borderRadius:14,padding:"20px 22px",color:"#2A231A",fontFamily:MONO,boxShadow:`0 3px 0 ${C.paperLine}`}}>
          <div style={{textAlign:"center",borderBottom:`2px dashed ${C.paperLine}`,paddingBottom:12}}><div style={{fontFamily:SANS,fontWeight:800,fontSize:15,letterSpacing:1}}>DAY REPORT</div><div style={{fontSize:12,marginTop:3}}>{sel}</div></div>
          <RRow l="Orders closed" v={String(day.length)}/>
          <div style={{borderTop:`1px dashed ${C.paperLine}`,margin:"8px 0"}}/>
          <RRow l="Cash" v={euro(cash)}/><RRow l="Card / POS" v={euro(card)}/>
          <div style={{borderTop:`2px dashed ${C.paperLine}`,margin:"10px 0"}}/>
          <div className="flex jb" style={{alignItems:"baseline"}}><span style={{fontFamily:SANS,fontWeight:800,fontSize:15}}>TOTAL</span><span style={{fontSize:26,fontWeight:800}}>{euro(dayTotal)}</span></div>
          <Sub>BY WAITER</Sub>
          {byWaiter.length===0?<Muted>—</Muted>:byWaiter.map(([n,v])=>(<div key={n} className="flex jb" style={{fontSize:12.5,padding:"2px 0"}}><span>{n}</span><span>{euro(v)}</span></div>))}
          <Sub>PRODUCTS SOLD</Sub>
          {products.length===0?<Muted>No sales recorded for this day.</Muted>:products.map((p)=>(<div key={p.name} className="flex jb" style={{fontSize:12.5,padding:"2px 0"}}><span>{p.qty}× {p.name}</span><span>{euro(p.rev)}</span></div>))}
        </div>
      </div>
    </div>
  );
}

          <button onClick={()=>{if(fN){act("addFloor",{name:fN});setFN("");}}} style={{...BIG,background:C.amber,color:C.ink,border:"none",fontWeight:700}}><Ico n="plus" size={16}/></button></div>
          <div className="flex wrap" style={{gap:6,marginTop:10}}>{floors.map((f)=>(<span key={f.id} className="flex ac" style={{gap:6,background:C.panel2,border:`1px solid ${C.line}`,borderRadius:20,padding:"5px 6px 5px 12px",fontSize:12.5}}>{f.name}
            <button onClick={()=>act("deleteFloor",{id:f.id})} style={{...ICON,width:22,height:22,background:"transparent"}}><Ico n="x" size={12} color={C.red}/></button></span>))}</div></div>

        <Title>Tables ({tables.length})</Title>
        <div style={CARD}><div className="flex" style={{gap:8}}><input placeholder="Name" value={tN} onChange={(e)=>setTN(e.target.value)} style={{...INP,flex:1}}/>
          <input placeholder="Seats" type="number" value={tSe} onChange={(e)=>setTSe(e.target.value)} style={{...INP,width:66}}/></div>
          <div className="flex" style={{gap:8,marginTop:8}}><select value={tF} onChange={(e)=>setTF(e.target.value)} style={{...INP,flex:1}}>{floors.map((f)=><option key={f.id} value={f.id}>{f.name}</option>)}</select>
            <button onClick={()=>{if(tN&&tF){act("addTable",{name:tN,seats:parseInt(tSe)||4,floorId:tF,x:50,y:50});setTN("");}}} className="flex ac" style={{...BIG,gap:6,background:C.amber,color:C.ink,border:"none",fontWeight:700}}><Ico n="plus" size={16}/> Add</button></div>
          <div style={{color:C.subtle,fontSize:11.5,marginTop:8}}>Position tables by dragging on the Floor screen.</div></div>

        <Title>Printers</Title>
        <div style={{...CARD,display:"grid",gap:8}}>
          <div className="flex" style={{gap:8}}><div style={{flex:1}}><label style={LBL}>Kitchen printer IP</label>
            <input placeholder="192.168.1.51" value={pr.kitchenIp} onChange={(e)=>setPr({...pr,kitchenIp:e.target.value})} onBlur={()=>act("setPrinters",pr)} style={{...INP,width:"100%"}}/></div>
            <div style={{flex:1}}><label style={LBL}>Receipt printer IP</label>
            <input placeholder="192.168.1.50" value={pr.receiptIp} onChange={(e)=>setPr({...pr,receiptIp:e.target.value})} onBlur={()=>act("setPrinters",pr)} style={{...INP,width:"100%"}}/></div></div>
          <div style={{color:C.subtle,fontSize:11.5}}>The server prints straight to these over your network. Leave blank to use the on-screen receipt.</div>
        </div>
        <div style={{marginTop:16,borderTop:`1px solid ${C.line}`,paddingTop:16}}>
          <button onClick={()=>{if(confirm("Reset everything to demo defaults?"))act("reset",{});}} style={{...BIG,background:"transparent",border:`1px solid ${C.red}`,color:C.red}}>Reset all data to demo defaults</button>
        </div>
      </div>
    </div>
  );
}

/* ---------- shared ---------- */
function Overlay({children,center,onBackdrop}){return(<div onClick={onBackdrop?(e)=>{if(e.target===e.currentTarget)onBackdrop();}:undefined}
  style={{position:"fixed",inset:0,zIndex:20,background:"rgba(10,8,6,.72)",display:center?"grid":"block",placeItems:center?"center":undefined,padding:center?16:0}}>
  {center?children:<div style={{position:"absolute",inset:0,maxWidth:1100,margin:"0 auto"}}>{children}</div>}</div>);}
function Center({children}){return<div style={{minHeight:"100vh",display:"grid",placeItems:"center",background:C.ink,color:C.text,fontFamily:SANS,padding:20}}>{children}</div>;}
const Title=({children})=><h2 style={{fontSize:13,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",color:C.mute,margin:"0 0 4px"}}>{children}</h2>;
const P=({children})=><p style={{color:C.mute,fontSize:12.5,margin:"6px 0 16px",maxWidth:640}}>{children}</p>;
const Empty=({children})=><div style={{background:C.panel,border:`1px dashed ${C.line}`,borderRadius:12,padding:30,textAlign:"center",color:C.subtle,fontSize:13}}>{children}</div>;
function Dot({s}){const m={kitchen:C.red,bar:C.amber,none:C.subtle};return<span title={s} style={{width:8,height:8,borderRadius:8,background:m[s]||C.subtle,flexShrink:0,display:"inline-block"}}/>;}
const ICON={width:36,height:36,borderRadius:9,border:"none",background:C.panel2,display:"grid",placeItems:"center",color:C.text};
const QTY={width:28,height:28,borderRadius:7,border:`1px solid ${C.line}`,background:C.panel2,display:"grid",placeItems:"center",color:C.text};
const BIG={display:"flex",alignItems:"center",justifyContent:"center",gap:8,borderRadius:10,padding:"11px 14px",fontSize:13.5,fontFamily:SANS};
const SMALL={display:"flex",alignItems:"center",borderRadius:20,padding:"8px 14px",fontSize:13,fontFamily:SANS,border:"none"};
const INP={background:C.panel2,border:`1px solid ${C.line}`,borderRadius:8,padding:"9px 11px",color:C.text,fontSize:13,fontFamily:SANS,outline:"none"};
const CARD={background:C.panel,borderRadius:12,border:`1px solid ${C.line}`,padding:12,margin:"8px 0 16px"};
const ROW={gap:8,background:C.panel,borderRadius:8,padding:"8px 10px",border:`1px solid ${C.line}`};
const LBL={fontSize:11,color:C.mute,display:"block",marginBottom:2};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
