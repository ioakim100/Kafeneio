<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Kafeneío POS</title>
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#141210" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Kafeneío" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;background:#141210;-webkit-tap-highlight-color:transparent}
  #root{min-height:100vh}
  .flex{display:flex}.ac{align-items:center}.jb{justify-content:space-between}.wrap{flex-wrap:wrap}
  button{font-family:inherit;transition:transform .06s ease, filter .12s ease, background .12s ease}
  button:active{transform:scale(.97)}
  .btn:hover,.tile:hover{filter:brightness(1.09)}
  input,select{font-family:inherit}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#3C332C;border-radius:8px}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,162,61,0)}50%{box-shadow:0 0 0 6px rgba(232,162,61,.16)}}
  .pulse{animation:pulse 1.7s ease-in-out infinite}
  @keyframes pop{from{transform:scale(.96);opacity:.4}to{transform:scale(1);opacity:1}}.pop{animation:pop .12s ease}
  @keyframes slidein{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}.toast{animation:slidein .18s ease}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const C = { ink:"#141210", panel:"#1F1B18", panel2:"#2A2420", panel3:"#332C26", line:"#3C332C",
  paper:"#F4ECDD", paperLine:"#CDBE9F", amber:"#E8A23D", amberDim:"#7A5A24", green:"#7BC49A",
  greenDim:"#2C4A38", blue:"#6FA8C7", blueDim:"#274653", red:"#D8735E", violet:"#C98FE8",
  text:"#F2E9DB", mute:"#A2917C", subtle:"#6E6156", plan:"#191512" };
const MONO='ui-monospace, "SF Mono", Menlo, Consolas, monospace';
const SANS='ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif';
const CATCOL={Coffee:"#C9884E","Cold Drinks":"#6FA8C7",Food:"#D8735E",Dessert:"#C98FE8"};
const PAL=["#E8A23D","#D8735E","#6FA8C7","#7BC49A","#C98FE8","#C9884E","#D4B24A"];
const catColor=(c)=>{if(CATCOL[c])return CATCOL[c];let h=0;for(const ch of String(c))h=(h*31+ch.charCodeAt(0))>>>0;return PAL[h%PAL.length];};
const STCOL={free:C.subtle,new:C.amber,prep:C.blue,served:C.green};
const STLABEL={free:"Free",new:"To send",prep:"Preparing",served:"Served"};
const SIZES={s:{square:60,round:52},m:{square:80,round:66},l:{square:104,round:84}};
const tsize=(t)=>SIZES[t.size||"m"][t.shape||"square"];

const euro=(n)=>"€"+(Number(n)||0).toFixed(2);
const round2=(n)=>Math.round(n*100)/100;
const lineGross=(x)=>round2((x.unit==="kg"?x.price*(x.weight||0):x.price)*(x.qty||1));
const perUnit=(x)=>x.unit==="kg"?round2(x.price*(x.weight||0)):x.price;
const qtyLabel=(x)=>x.unit==="kg"?((x.weight||0)+" kg"):x.unit==="open"?"":(x.qty+"×");
const orderTotal=(o)=>round2((o?.items||[]).reduce((s,x)=>s+lineGross(x),0));
const paidSum=(o)=>round2((o?.payments||[]).reduce((s,x)=>s+x.amount,0));
const paidQtyMap=(o)=>{const m={};(o?.payments||[]).forEach(p=>(p.lines||[]).forEach(l=>{m[l.lid]=(m[l.lid]||0)+l.qty;}));return m;};
const uid=()=>Math.random().toString(36).slice(2,9);
const optsText=(it)=>it&&it.opts&&it.opts.length?it.opts.map(o=>o.values.join(", ")).join(" · "):"";
const dayKey=(d)=>{const x=new Date(d);return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`;};
let DAY_START=5;
const bizDay=(d)=>{const t=(typeof d==="number"?d:new Date(d).getTime())-DAY_START*3600000;return dayKey(new Date(t));};
const weekStartKey=(k)=>{const d=new Date(k+"T12:00:00");const off=(d.getDay()+6)%7;d.setDate(d.getDate()-off);return dayKey(d);};
const fmtDShort=(k)=>new Date(k+"T12:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short"});
const fmtMonthLabel=(mk)=>{const[y,m]=mk.split("-");return new Date(+y,+m-1,1).toLocaleString("en-US",{month:"long",year:"numeric"});};
const fmtDayLabel=(k)=>new Date(k+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"});
const relTime=(iso,now)=>{if(!iso)return"";const s=Math.max(0,Math.floor((now-new Date(iso).getTime())/1000));if(s<60)return"just now";const m=Math.floor(s/60);if(m<60)return m+" min";return Math.floor(m/60)+"h "+(m%60)+"m";};
const tableStatus=(o)=>{if(!o||!o.items.length)return"free";if(o.items.some(x=>!x.sent))return"new";if(o.items.some(x=>x.sent&&!x.done))return"prep";return"served";};

let PRINTERS=[];
const pColor=(id)=>{const p=PRINTERS.find(x=>x.id===id);return p?p.color:C.subtle;};
const pName=(id)=>{const p=PRINTERS.find(x=>x.id===id);return p?p.name:"—";};
let WAITERS=[];
const ROLES={
  admin:{label:"Admin",tabs:["floor","orders","prep","reports","setup"]},
  manager:{label:"Floor manager",tabs:["floor","orders","prep"]},
  waiter:{label:"Waiter",tabs:["floor","orders","prep"]},
  kitchen:{label:"Kitchen / Bar",tabs:["orders","prep"]},
};
const roleLabel=(r)=>(ROLES[r]||ROLES.waiter).label;
const wColor=(id)=>{const w=WAITERS.find(x=>x.id===id);return w?w.color:C.subtle;};
const wLabel=(id)=>{const w=WAITERS.find(x=>x.id===id);return w?w.name:"";};
function printerReceives(pr,item,receiptId){
  if(!item.printerId||item.printerId===receiptId)return false;
  const mode=pr.mode||(pr.all?"all":"own");
  if(mode==="all")return true;
  if(mode==="rest"){const q=PRINTERS.find(x=>x.id===item.printerId);return !!q&&!q.food;}
  return item.printerId===pr.id;
}

function useIsMobile(bp=760){const [m,setM]=useState(typeof window!=="undefined"&&window.innerWidth<bp);
  useEffect(()=>{const f=()=>setM(window.innerWidth<bp);window.addEventListener("resize",f);return()=>window.removeEventListener("resize",f);},[]);return m;}

const PATHS={ coffee:"M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4z",
  grid:"M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z", list:"M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01",
  chef:"M6 3v18M6 9c-2 0-3-1-3-3V3M9 6c0 2-1 3-3 3M15 3c-2 1-3 3-3 6 0 2 1 3 3 3v9",
  glass:"M6 3h12l-1 8a5 5 0 01-10 0zM12 16v5M8 21h8", chart:"M18 20V10M12 20V4M6 20v-6",
  sliders:"M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6",
  plus:"M12 5v14M5 12h14", minus:"M5 12h14", x:"M18 6 6 18M6 6l12 12", check:"M20 6 9 17l-5-5",
  circle:"M12 21a9 9 0 100-18 9 9 0 000 18z", undo:"M3 7v6h6M3 13a9 9 0 103-7.7L3 8",
  trash:"M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14", printer:"M6 9V2h12v7M6 18H4v-6h16v6h-2M8 14h8v6H8z",
  back:"M19 12H5M12 19l-7-7 7-7", left:"M15 18l-6-6 6-6", right:"M9 18l6-6-6-6",
  move:"M12 2v20M2 12h20M5 9 2 12l3 3M19 9l3 3-3 3M9 5l3-3 3 3M9 19l3 3 3-3",
  clock:"M12 22a10 10 0 100-20 10 10 0 000 20zM12 6v6l4 2", send:"M22 2 11 13M22 2l-7 20-4-9-9-4z",
  card:"M2 7h20v10H2zM2 11h20", cash:"M2 6h20v12H2zM12 15a3 3 0 100-6 3 3 0 000 6z",
  note:"M11 4H4v16h16v-7M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4z", lock:"M5 11h14v10H5zM8 11V7a4 4 0 018 0v4",
  logout:"M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9", eye:"M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7zM12 15a3 3 0 100-6 3 3 0 000 6z", save:"M12 3v12M8 11l4 4 4-4M4 21h16" };
function Ico({n,size=18,color="currentColor"}){return(<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={PATHS[n]}/></svg>);}

let WAITER=null;
async function act(type,payload){const r=await fetch("/api/action",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type,payload,waiterId:WAITER&&WAITER.id})});return r.json();}

/* ================= app ================= */
function App(){
  const [state,setState]=useState(null);
  const [waiter,setWaiter]=useState(()=>{try{return JSON.parse(localStorage.getItem("waiter"));}catch{return null;}});
  const [view,setView]=useState("floor");const [now,setNow]=useState(Date.now());
  const [floorId,setFloorId]=useState(null);const [arrange,setArrange]=useState(false);
  const [activeId,setActiveId]=useState(null);const [payId,setPayId]=useState(null);const [receipt,setReceipt]=useState(null);
  const [preview,setPreview]=useState(null);
  const [toast,setToast]=useState(null);
  const mob=useIsMobile();
  useEffect(()=>{WAITER=waiter;},[waiter]);
  useEffect(()=>{const i=setInterval(()=>setNow(Date.now()),15000);return()=>clearInterval(i);},[]);
  useEffect(()=>{const es=new EventSource("/api/events");es.onmessage=(e)=>{const s=JSON.parse(e.data);setState(s);setFloorId((f)=>f||(s.floors[0]&&s.floors[0].id));};return()=>es.close();},[]);
  const showToast=(t,c)=>{setToast({t,c});setTimeout(()=>setToast(null),2600);};

  if(!state) return <Center><div style={{color:C.mute}}>Connecting…</div></Center>;
  if(!waiter) return <Login waiters={state.waiters} shopName={(state.shop&&state.shop.name)||"Kafeneío POS"} onLogin={(w)=>{localStorage.setItem("waiter",JSON.stringify(w));setWaiter(w);}}/>;
  PRINTERS=state.printers; WAITERS=state.waiters; DAY_START=(state.shop&&state.shop.dayStart!=null)?state.shop.dayStart:5;
  const isAdmin=waiter.role==="admin";
  const allow=(ROLES[waiter.role]||ROLES.waiter).tabs;
  const open=state.open, tables=state.tables, floors=state.floors, waiters=state.waiters;
  const prepPrinters=state.printers.filter((p)=>p.id!==state.receiptPrinterId);
  const tabs=[
    ...(allow.includes("floor")?[{id:"floor",label:"Floor",icon:"grid"}]:[]),
    ...(allow.includes("orders")?[{id:"orders",label:"Orders",icon:"list"}]:[]),
    ...(allow.includes("prep")?prepPrinters.map((p)=>({id:"prep:"+p.id,label:p.name,icon:/bar/i.test(p.name)?"glass":/kitchen/i.test(p.name)?"chef":"printer"})):[]),
    ...(allow.includes("reports")?[{id:"reports",label:"Reports",icon:"chart"}]:[]),
    ...(allow.includes("setup")?[{id:"setup",label:"Setup",icon:"sliders"}]:[])];
  if(tabs.length&&!tabs.find((t)=>t.id===view)) setView(tabs[0].id);

  const floorTables=tables.filter((t)=>t.floorId===floorId);
  const active=activeId?tables.find((t)=>t.id===activeId):null;const activeOrder=activeId?open[activeId]:null;
  const payTable=payId?tables.find((t)=>t.id===payId):null;const payOrder=payId?open[payId]:null;
  const wname=(id)=>{const w=waiters.find((w)=>w.id===id);return w?w.name:"—";};
  const prepView=view.startsWith("prep:")?state.printers.find((p)=>p.id===view.slice(5)):null;

  const billStatus=(r)=>{const pr=r&&r.print;if(!pr)return{t:"",c:C.mute};if(pr.ok)return{t:"✓ Sent to receipt printer",c:C.green};if(pr.reason==="off")return{t:"Auto-print is off — showing preview (tap Print to print)",c:C.mute};return{t:pr.reason==="no-ip"?"No receipt printer set — showing preview":"Receipt printer offline — showing preview",c:C.amber};};
  const onPlace=async(t)=>{
    const res=await act("placeOrder",{tableId:t.id});
    setActiveId(null); setView("floor");
    const pr=res&&res.print;
    if(pr&&pr.muted) showToast("✓ "+t.name+" — order sent (auto-print off)",C.green);
    else if(!pr||!pr.results||!pr.results.length) showToast("✓ "+t.name+" — order sent",C.green);
    else if(pr.results.every((x)=>x.ok)) showToast("✓ "+t.name+" sent to "+pr.results.map((x)=>x.name).join(", "),C.green);
    else showToast(t.name+" sent · offline: "+pr.results.filter((x)=>!x.ok).map((x)=>x.name).join(", "),C.amber);
  };
  const onBill=async(t)=>{const o=open[t.id];const res=await act("printBill",{tableId:t.id});
    setReceipt({title:"KAFENEÍO",priced:true,tableName:t.name,servedBy:waiter.name,items:o.items,total:orderTotal(o),payments:o.payments||[],shop:state.shop,status:billStatus(res)});};
  const doPay=async(amount,method,lines)=>{const res=await act("pay",{tableId:payId,amount,method,lines});if(res.sale){setPayId(null);
    setReceipt({title:"KAFENEÍO",priced:true,tableName:res.sale.tableName,servedBy:wname(res.sale.waiterId),items:res.sale.items,total:res.sale.total,payments:res.sale.payments,method:res.sale.method,shop:state.shop,status:billStatus(res)});}};

  return (
    <div style={{background:C.ink,minHeight:"100vh",color:C.text,fontFamily:SANS,maxWidth:1100,margin:"0 auto",position:"relative"}}>
      <TopBar tabs={tabs} view={view} setView={setView} waiter={waiter} openCount={Object.keys(open).length} shopName={(state.shop&&state.shop.name)||"Kafeneío POS"} onLogout={()=>{localStorage.removeItem("waiter");setWaiter(null);}}/>
      <div style={{padding:mob?10:16}}>
        {view==="floor"&&<Floor floors={floors} floorId={floorId} setFloorId={setFloorId} tables={floorTables} open={open} arrange={arrange} setArrange={setArrange} now={now} isAdmin={isAdmin} onPick={(t)=>setActiveId(t.id)}/>}
        {view==="orders"&&<Orders open={open} tables={tables} floors={floors} now={now} waiter={waiter} onPick={(t)=>setActiveId(t.id)} onPay={(t)=>setPayId(t.id)}/>}
        {prepView&&<Prep printer={prepView} receiptId={state.receiptPrinterId} open={open} tables={tables} floors={floors} now={now}/>}
        {view==="reports"&&isAdmin&&<Reports sales={state.sales} waiters={waiters}/>}
        {view==="setup"&&isAdmin&&<Setup state={state} mob={mob}/>}
      </div>
      {active&&<OrderScreen table={active} order={activeOrder} menu={state.menu} wname={wname} mob={mob}
        onAdd={(m,opts,weight,amount)=>act("addItem",{tableId:active.id,item:{id:m.id,name:m.name,price:(m.unit==="open"&&amount!=null)?amount:m.price,printerId:m.printerId,vat:m.vat,unit:m.unit,weight:weight||null,opts:opts||null}})}
        onQty={(i,d)=>act("changeQty",{tableId:active.id,index:i,delta:d})} onRemove={(i)=>act("removeItem",{tableId:active.id,index:i})}
        onNote={(i,note)=>act("setNote",{tableId:active.id,index:i,note})} onWeight={(i,weight)=>act("setWeight",{tableId:active.id,index:i,weight})} onPrice={(i,price)=>act("setPrice",{tableId:active.id,index:i,price})} onClose={()=>setActiveId(null)}
        onPlace={()=>onPlace(active)} onBill={()=>onBill(active)} onPay={()=>setPayId(active.id)}
        onPreview={async()=>{const r=await act("preview",{tableId:active.id});if(r&&r.preview)setPreview({table:active.name,...r.preview});}}/>}
      {preview&&<PreviewModal data={preview} onClose={()=>setPreview(null)}/>}
      {payTable&&payOrder&&<PayModal name={payTable.name} order={payOrder} mob={mob} onAdd={doPay} onCancel={()=>setPayId(null)}/>}
      {receipt&&<Receipt data={receipt} onClose={()=>setReceipt(null)}/>}
      {toast&&<div className="toast" style={{position:"fixed",left:"50%",transform:"translateX(-50%)",bottom:20,zIndex:40,background:C.panel3,border:`1px solid ${toast.c}`,color:C.text,borderRadius:12,padding:"12px 18px",fontSize:13.5,fontWeight:600,maxWidth:"90%",textAlign:"center",boxShadow:"0 8px 24px rgba(0,0,0,.4)"}}>{toast.t}</div>}
    </div>
  );
}

/* ---------- login (always asks PIN) ---------- */
function Login({waiters,onLogin,shopName}){
  const [sel,setSel]=useState(null);const [pin,setPin]=useState("");const [err,setErr]=useState("");
  const submit=async(name,p)=>{const r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,pin:p})});if(r.ok)onLogin((await r.json()).waiter);else setErr("Wrong PIN");};
  return(<Center><div style={{width:320,textAlign:"center"}}>
    <div style={{width:54,height:54,borderRadius:16,background:`linear-gradient(135deg,${C.amber},#C97B2A)`,display:"grid",placeItems:"center",margin:"0 auto 16px"}}><Ico n="coffee" size={28} color={C.ink}/></div>
    <div style={{fontWeight:800,fontSize:20}}>{shopName||"Kafeneío POS"}</div><div style={{color:C.mute,fontSize:13,margin:"4px 0 22px"}}>Who's on shift?</div>
    {!sel?(<div style={{display:"grid",gap:8}}>{waiters.map((w)=>(<button key={w.id} className="btn" onClick={()=>{setErr("");setPin("");setSel(w);}}
        style={{display:"flex",alignItems:"center",gap:12,background:C.panel,border:`1px solid ${C.line}`,borderRadius:12,padding:"14px 16px",color:C.text,cursor:"pointer"}}>
        <span style={{width:12,height:12,borderRadius:12,background:w.color}}/><span style={{fontWeight:700,fontSize:15,flex:1,textAlign:"left"}}>{w.name}</span>
        {w.role!=="waiter"&&<span style={{fontSize:10,fontWeight:800,color:w.role==="admin"?C.violet:C.blue,border:`1px solid ${w.role==="admin"?C.violet:C.blue}`,borderRadius:5,padding:"1px 6px"}}>{roleLabel(w.role).toUpperCase()}</span>}</button>))}
        <div style={{color:C.subtle,fontSize:11.5,marginTop:6}}><Ico n="lock" size={11}/> A PIN is required — customers can't get in without it.</div></div>
    ):(<div style={{display:"grid",gap:10}}>
      <div className="flex ac" style={{gap:12,justifyContent:"center"}}><span style={{width:12,height:12,borderRadius:12,background:sel.color}}/><span style={{fontWeight:700}}>{sel.name}</span></div>
      <div style={{color:C.mute,fontSize:12}}>Enter PIN</div>
      <input autoFocus type="password" inputMode="numeric" value={pin} onChange={(e)=>setPin(e.target.value)} onKeyDown={(e)=>{if(e.key==="Enter")submit(sel.name,pin);}} style={{...INP,textAlign:"center",fontSize:22,letterSpacing:6}}/>
      {err&&<div style={{color:C.red,fontSize:12}}>{err}</div>}
      <button className="btn" onClick={()=>submit(sel.name,pin)} style={{...BIG,background:C.amber,color:C.ink,border:"none",fontWeight:800,cursor:"pointer"}}>Start shift</button>
      <button onClick={()=>{setSel(null);setPin("");setErr("");}} style={{...BIG,background:"transparent",border:`1px solid ${C.line}`,color:C.mute,cursor:"pointer"}}>Back</button></div>)}
  </div></Center>);
}

/* ---------- top bar ---------- */
function TopBar({tabs,view,setView,waiter,openCount,onLogout,shopName}){
  return(<div style={{position:"sticky",top:0,zIndex:5,background:`linear-gradient(${C.panel},#1a1613)`,borderBottom:`1px solid ${C.line}`}}>
    <div className="flex ac" style={{gap:10,padding:"12px 14px 6px"}}>
      <div style={{width:28,height:28,borderRadius:8,background:`linear-gradient(135deg,${C.amber},#C97B2A)`,display:"grid",placeItems:"center"}}><Ico n="coffee" size={16} color={C.ink}/></div>
      <div style={{flex:1,minWidth:0}}><div style={{fontWeight:800,fontSize:15,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{shopName}</div><div style={{fontSize:10.5,color:C.mute,fontFamily:MONO,letterSpacing:1}}>{bizDay(Date.now())}{openCount?` · ${openCount} open`:""}</div></div>
      <button className="btn" onClick={onLogout} style={{display:"flex",alignItems:"center",gap:7,background:C.panel2,border:`1px solid ${C.line}`,borderRadius:20,padding:"6px 12px",color:C.text,cursor:"pointer"}}>
        <span style={{width:9,height:9,borderRadius:9,background:waiter.color}}/><span style={{fontSize:12.5,fontWeight:700}}>{waiter.name}</span><Ico n="logout" size={13} color={C.mute}/></button>
    </div>
    <div className="flex" style={{gap:2,padding:"4px 6px 0",overflowX:"auto"}}>
      {tabs.map((t)=>{const on=view===t.id;return(<button key={t.id} onClick={()=>setView(t.id)} className="flex ac" style={{gap:6,padding:"9px 12px",border:"none",background:"transparent",cursor:"pointer",color:on?C.amber:C.mute,fontWeight:on?700:500,fontSize:13,borderBottom:`2px solid ${on?C.amber:"transparent"}`,whiteSpace:"nowrap"}}><Ico n={t.icon} size={15}/> {t.label}</button>);})}
    </div>
  </div>);
}

/* ---------- floor ---------- */
function Floor({floors,floorId,setFloorId,tables,open,arrange,setArrange,now,isAdmin,onPick}){
  const [sel,setSel]=useState(null);const selTable=tables.find((t)=>t.id===sel);
  return(<div>
    <div className="flex ac jb wrap" style={{gap:10,marginBottom:10}}>

/* ---------- options picker (order-taking) ---------- */
function OptionsModal({product,onCancel,onConfirm}){
  const groups=product.options||[];
  const [sel,setSel]=useState({});
  const choose=(g,ch)=>setSel((s)=>{const cur=s[g.id]||[];if(g.multi)return {...s,[g.id]:cur.includes(ch)?cur.filter((v)=>v!==ch):[...cur,ch]};return {...s,[g.id]:[ch]};});
  const missing=groups.filter((g)=>g.required&&!(sel[g.id]&&sel[g.id].length));
  const confirm=()=>{if(missing.length)return;const opts=groups.map((g)=>({name:g.name,values:sel[g.id]||[]})).filter((o)=>o.values.length);onConfirm(opts.length?opts:null);};
  return(<Overlay center onBackdrop={onCancel}><div style={{background:C.panel,borderRadius:16,padding:18,width:"100%",maxWidth:380,border:`1px solid ${C.line}`,maxHeight:"90vh",overflowY:"auto"}}>
    <div className="flex ac jb"><span style={{fontWeight:800,fontSize:16}}>{product.name}</span><button className="btn" onClick={onCancel} style={{...ICON,cursor:"pointer"}}><Ico n="x" size={18} color={C.mute}/></button></div>
    {groups.map((g)=>(<div key={g.id} style={{marginTop:14}}>
      <div className="flex ac" style={{gap:6,marginBottom:6}}><span style={{fontSize:12.5,fontWeight:700}}>{g.name}</span>{g.required&&<span style={{fontSize:9.5,fontWeight:800,color:C.red}}>REQUIRED</span>}{g.multi&&<span style={{fontSize:9.5,color:C.subtle}}>choose any</span>}</div>
      <div className="flex wrap" style={{gap:6}}>{g.choices.map((ch)=>{const on=(sel[g.id]||[]).includes(ch);return(<button key={ch} className="btn" onClick={()=>choose(g,ch)} style={{padding:"9px 14px",borderRadius:10,border:`1px solid ${on?C.amber:C.line}`,background:on?C.amber:C.panel3,color:on?C.ink:C.text,fontWeight:on?800:500,fontSize:13,cursor:"pointer"}}>{ch}</button>);})}</div>
    </div>))}
    <button className="btn" onClick={confirm} disabled={missing.length>0} style={{...BIG,width:"100%",justifyContent:"center",marginTop:18,background:missing.length?C.panel2:C.amber,color:missing.length?C.subtle:C.ink,border:"none",fontWeight:800,cursor:missing.length?"default":"pointer"}}><Ico n="plus" size={16} color={missing.length?C.subtle:C.ink}/> {missing.length?`Choose ${missing[0].name}`:"Add to order"}</button>
  </div></Overlay>);
}

/* ---------- pay: tap items to split, or pay all ---------- */
function PayModal({name,order,mob,onAdd,onCancel}){
  const total=orderTotal(order);const paid=paidSum(order);const remaining=round2(total-paid);
  const paidMap=paidQtyMap(order);
  const payments=order.payments||[];
  const lines=(order.items||[]).map((x)=>({...x,unpaid:x.qty-(paidMap[x.lid]||0)})).filter((x)=>x.unpaid>0);
  const [mode,setMode]=useState("item");
  const [sel,setSel]=useState({});
  const [method,setMethod]=useState("cash");
  const [amount,setAmount]=useState(remaining.toFixed(2));
  useEffect(()=>{setAmount(remaining.toFixed(2));},[remaining]);
  const selAmount=round2(lines.reduce((s,x)=>s+(sel[x.lid]||0)*perUnit(x),0));
  const anySel=Object.values(sel).some((q)=>q>0);
  const toggleLine=(x)=>setSel((s)=>({...s,[x.lid]:(s[x.lid]||0)>0?0:x.unpaid}));
  const bump=(x,d)=>setSel((s)=>({...s,[x.lid]:Math.max(0,Math.min(x.unpaid,(s[x.lid]||0)+d))}));
  const selectAll=()=>{const n={};lines.forEach((x)=>n[x.lid]=x.unpaid);setSel(n);};
  const payItems=()=>{const amt=anySel?selAmount:remaining;if(amt<=0)return;if(anySel){const l=Object.entries(sel).filter(([,q])=>q>0).map(([lid,qty])=>({lid,qty}));onAdd(amt,method,l);}else onAdd(amt,method);setSel({});};
  const payAmount=()=>{const a=round2(parseFloat(amount)||0);if(a<=0)return;onAdd(a,method);};
  const Toggle=({on})=>(<span style={{width:40,height:23,borderRadius:23,background:on?C.green:C.line,position:"relative",flexShrink:0,transition:"background .12s"}}><span style={{position:"absolute",top:2,left:on?19:2,width:19,height:19,borderRadius:19,background:"#fff",transition:"left .12s"}}/></span>);
  return(<Overlay center onBackdrop={onCancel}><div style={{display:"flex",flexDirection:"column",background:C.panel,borderRadius:16,width:mob?"100%":380,maxWidth:440,border:`1px solid ${C.line}`,maxHeight:"92vh",overflow:"hidden"}}>
    <div style={{padding:"16px 18px 0"}}>
      <div className="flex ac jb"><span style={{fontWeight:800,fontSize:16}}>Pay · {name}</span><button className="btn" onClick={onCancel} style={{...ICON,cursor:"pointer"}}><Ico n="x" size={18} color={C.mute}/></button></div>
      <div className="flex ac jb" style={{margin:"10px 0 2px"}}><span style={{color:C.mute,fontSize:12.5}}>Remaining</span><span style={{fontFamily:MONO,fontSize:28,fontWeight:800,color:C.amber}}>{euro(remaining)}</span></div>
      <div style={{fontSize:11.5,color:C.subtle}}>Total {euro(total)}{paid>0?` · paid ${euro(paid)}`:""}</div>

    </div>

    <div style={{flex:1,overflowY:"auto",padding:"6px 18px"}}>

        <div className="flex ac jb" style={{margin:"2px 0 8px"}}><span style={{fontSize:11.5,color:C.mute}}>Tap what this guest pays for</span><div className="flex" style={{gap:6}}><button className="btn" onClick={selectAll} style={{...CHIP,padding:"4px 9px",background:C.panel3,color:C.text}}>All</button><button className="btn" onClick={()=>setSel({})} style={{...CHIP,padding:"4px 9px",background:C.panel3,color:C.mute}}>Clear</button></div></div>

            <div className="flex ac" style={{gap:11,cursor:"pointer"}} onClick={()=>toggleLine(x)}>
              <Toggle on={on}/>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:13.5,fontWeight:600}}>{x.name}{x.unit==="kg"?` · ${x.weight||0} kg`:""}</div><div style={{fontSize:11,color:C.mute,fontFamily:MONO}}>{euro(x.price)}{x.unit==="kg"?"/kg":""}{x.unpaid>1?` · ${x.unpaid} left`:""}</div></div>
              <span style={{fontFamily:MONO,fontWeight:800,color:on?C.green:C.mute,fontSize:14}}>{euro((on?q:x.unpaid)*perUnit(x))}</span>

          </div>);})}</div>
      </React.Fragment>)):(<React.Fragment>
        <div className="flex" style={{gap:6,margin:"6px 0 12px"}}>{[["Full",1],["½",2],["⅓",3],["¼",4]].map(([lbl,n])=>(<button key={lbl} className="btn" onClick={()=>setAmount((remaining/n).toFixed(2))} style={{flex:1,padding:"10px 0",borderRadius:9,border:`1px solid ${C.line}`,background:C.panel3,color:C.text,fontSize:13,fontWeight:700,cursor:"pointer"}}>{lbl}</button>))}</div>
        <div className="flex ac" style={{gap:8}}><span style={{fontFamily:MONO,color:C.mute}}>€</span><input type="number" inputMode="decimal" value={amount} onChange={(e)=>setAmount(e.target.value)} style={{...INP,flex:1,fontFamily:MONO,fontSize:18}}/></div>
      </React.Fragment>)}
    </div>

    <div style={{padding:"10px 18px 16px",borderTop:`1px solid ${C.line}`,background:C.panel}}>
      <div className="flex" style={{gap:8,marginBottom:10}}>
        <button className="btn" onClick={()=>setMethod("cash")} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"11px 0",borderRadius:10,border:`1px solid ${method==="cash"?C.green:C.line}`,background:method==="cash"?"rgba(123,196,154,.12)":C.panel3,color:C.text,fontWeight:700,cursor:"pointer"}}><Ico n="cash" size={18} color={C.green}/> Cash</button>
        <button className="btn" onClick={()=>setMethod("card")} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"11px 0",borderRadius:10,border:`1px solid ${method==="card"?C.amber:C.line}`,background:method==="card"?"rgba(232,162,61,.12)":C.panel3,color:C.text,fontWeight:700,cursor:"pointer"}}><Ico n="card" size={18} color={C.amber}/> Card / POS</button></div>
      {mode==="item"?
        <button className="btn" onClick={payItems} style={{...BIG,width:"100%",justifyContent:"space-between",background:C.green,border:"none",color:C.ink,fontWeight:800,fontSize:15,cursor:"pointer"}}><span>{anySel?"Pay selected":"Pay all"}</span><span style={{fontFamily:MONO}}>{euro(anySel?selAmount:remaining)}</span></button>:
        <button className="btn" onClick={payAmount} style={{...BIG,width:"100%",justifyContent:"space-between",background:C.green,border:"none",color:C.ink,fontWeight:800,fontSize:15,cursor:"pointer"}}><span>{parseFloat(amount)>=remaining?"Pay & close":"Take part payment"}</span><span style={{fontFamily:MONO}}>{euro(parseFloat(amount)||0)}</span></button>}
    </div>
  </div></Overlay>);
}

/* ---------- restore-from-backup picker ---------- */

      {priced&&shop?(<div style={{fontSize:10.5,lineHeight:1.5}}>{shop.address&&<div>{shop.address}</div>}{(shop.vat||shop.taxOffice)&&<div>{shop.vat?("ΑΦΜ "+shop.vat):""}{shop.taxOffice?("  ΔΟΥ "+shop.taxOffice):""}</div>}{shop.phone&&<div>Τηλ {shop.phone}</div>}</div>):<div style={{fontSize:11}}>{priced?"thank you":"routed to prep stations"}</div>}</div>

      {priced&&<React.Fragment><div style={{borderTop:`2px dashed ${C.paperLine}`,margin:"8px 0"}}/><div className="flex jb" style={{fontWeight:800,fontSize:15}}><span style={{fontFamily:SANS}}>TOTAL</span><span>{euro(total)}</span></div>{payments.map((p,i)=>(<div key={i} className="flex jb" style={{fontSize:12}}><span>{p.method==="card"?"Card/POS":"Cash"}</span><span>{euro(p.amount)}</span></div>))}{method==="split"&&<div style={{textAlign:"center",marginTop:8,fontSize:12,letterSpacing:1}}>· SPLIT BILL ·</div>}</React.Fragment>}
      <div style={{textAlign:"center",marginTop:12,fontSize:20}}>* * *</div>

/* ---------- reports ---------- */
function Reports({sales,waiters}){
  const today=bizDay(Date.now());
  const [from,setFrom]=useState(today);const [to,setTo]=useState(today);const [openIds,setOpenIds]=useState({});const [gexp,setGexp]=useState({});const [pexp,setPexp]=useState({});
  const list=useMemo(()=>sales.filter((s)=>{const d=bizDay(s.closedAt);return d>=from&&d<=to;}),[sales,from,to]);
  const gross=round2(list.reduce((s,x)=>s+x.total,0));
  const agg=useMemo(()=>{let net=0,vat=0;const rate={},prod={},wmap={},pay={cash:0,card:0};
    list.forEach((s)=>{
      s.items.forEach((it)=>{const g=lineGross(it);const r=it.vat!=null?it.vat:0;const n=g/(1+r/100);net+=n;vat+=g-n;
        const e=rate[r]||{rate:r,gross:0,net:0,vat:0};e.gross+=g;e.net+=n;e.vat+=g-n;rate[r]=e;
        const pe=prod[it.name]||{name:it.name,unit:it.unit||"each",qty:0,kg:0,rev:0};if(it.unit==="kg")pe.kg+=(it.weight||0)*(it.qty||1);else pe.qty+=it.qty;pe.rev+=g;prod[it.name]=pe;});
      const wn=(waiters.find((w)=>w.id===s.waiterId)||{}).name||"—";wmap[wn]=wmap[wn]||{name:wn,gross:0,tx:0};wmap[wn].gross+=s.total;wmap[wn].tx+=1;
      const ps=s.payments&&s.payments.length?s.payments:[{amount:s.total,method:s.method}];ps.forEach((p)=>{pay[p.method==="card"?"card":"cash"]+=p.amount;});
    });
    return {net:round2(net),vat:round2(vat),rates:Object.values(rate).sort((a,b)=>a.rate-b.rate),products:Object.values(prod).sort((a,b)=>b.rev-a.rev),waiterRows:Object.values(wmap).sort((a,b)=>b.gross-a.gross),cash:round2(pay.cash),card:round2(pay.card)};
  },[list,waiters]);
  const setRange=(f,t)=>{setFrom(f);setTo(t);};
  const yday=()=>bizDay(Date.now()-24*3600000);
  const monthStart=()=>{const d=new Date();return dayKey(new Date(d.getFullYear(),d.getMonth(),1));};
  return(<div>
    <div className="flex ac jb wrap" style={{gap:10,marginBottom:8}}><Title>Sales report</Title>
      <div className="flex" style={{gap:8}}><button className="btn" onClick={()=>{if(confirm("Add ~1 year of random demo sales for testing? Use Reset later to clear them."))act("seedDemoSales",{});}} style={{display:"flex",alignItems:"center",gap:7,...SMALL,background:C.panel2,border:`1px solid ${C.line}`,color:C.mute,cursor:"pointer"}}><Ico n="plus" size={15}/> Demo data</button><button className="btn" onClick={()=>window.print()} style={{display:"flex",alignItems:"center",gap:7,...SMALL,background:C.panel3,color:C.text,cursor:"pointer"}}><Ico n="printer" size={15}/> Print</button></div></div>
    <div className="flex ac wrap" style={{gap:10,marginBottom:14}}>
      <label style={{fontSize:12,color:C.mute}}>From <input type="date" value={from} max={to} onChange={(e)=>setFrom(e.target.value)} style={{...INP,padding:"7px 9px",colorScheme:"dark"}}/></label>
      <label style={{fontSize:12,color:C.mute}}>To <input type="date" value={to} min={from} onChange={(e)=>setTo(e.target.value)} style={{...INP,padding:"7px 9px",colorScheme:"dark"}}/></label>
      <div className="flex" style={{gap:6}}>{[["Today",()=>setRange(today,today)],["Yesterday",()=>setRange(yday(),yday())],["This month",()=>setRange(monthStart(),today)]].map(([l,fn])=>(<button key={l} className="btn" onClick={fn} style={{...CHIP,background:C.panel3,color:C.text}}>{l}</button>))}</div>
    </div>
    <div style={{display:"grid",gap:10,gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",marginBottom:14}}>
      <Stat label="Transactions" val={String(list.length)}/>
      <Stat label="Turnover (gross)" val={euro(gross)} accent/>
      <Stat label="Net sales" val={euro(agg.net)}/>
      <Stat label="VAT" val={euro(agg.vat)}/>
    </div>
    <div style={{display:"grid",gap:16,gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",alignItems:"start"}}>
      <Panel title="By payment type"><KV k="Cash" v={euro(agg.cash)}/><KV k="Card / POS" v={euro(agg.card)}/></Panel>
      <Panel title="VAT breakdown">{agg.rates.length===0?<Muted2>No sales.</Muted2>:agg.rates.map((r)=>(<div key={r.rate} style={{marginBottom:10}}><div style={{fontWeight:700,fontSize:13,marginBottom:2,color:C.amber}}>VAT {r.rate}%</div><KV k="Gross" v={euro(round2(r.gross))}/><KV k="Net" v={euro(round2(r.net))}/><KV k="VAT" v={euro(round2(r.vat))}/></div>))}</Panel>
      <Panel title="By waiter">{agg.waiterRows.length===0?<Muted2>No sales.</Muted2>:agg.waiterRows.map((w)=>(<KV key={w.name} k={`${w.name} · ${w.tx} tx`} v={euro(round2(w.gross))}/>))}</Panel>
      <Panel title="Products sold">{agg.products.length===0?<Muted2>No sales.</Muted2>:agg.products.map((p)=>{const on=!!pexp[p.name];const label=`${p.unit==="kg"?round2(p.kg)+" kg":p.qty+"×"} ${p.name}`;const matches=on?list.filter((s)=>s.items.some((it)=>it.name===p.name)).sort((a,b)=>new Date(b.closedAt)-new Date(a.closedAt)):[];return(
        <div key={p.name}>
          <button className="btn" onClick={()=>setPexp((x)=>({...x,[p.name]:!x[p.name]}))} style={{width:"100%",display:"flex",alignItems:"center",gap:8,background:"transparent",border:"none",padding:"4px 0",color:C.text,cursor:"pointer",textAlign:"left"}}>
            <span style={{color:C.subtle,transform:on?"rotate(90deg)":"none",transition:"transform .12s",display:"flex"}}><Ico n="right" size={13}/></span>
            <span style={{flex:1,fontSize:12.5}}>{label}</span><span style={{fontFamily:MONO,fontWeight:700,fontSize:12.5}}>{euro(round2(p.rev))}</span></button>
          {on&&<div style={{margin:"2px 0 8px 21px",borderLeft:`2px solid ${C.line}`,paddingLeft:10}}>{matches.map((s)=>{let q=0,kg=0,amt=0;s.items.forEach((it)=>{if(it.name===p.name){if(it.unit==="kg")kg+=(it.weight||0)*(it.qty||1);else q+=it.qty;amt+=lineGross(it);}});return(
            <div key={s.id} className="flex ac jb" style={{fontSize:11.5,padding:"2px 0",color:C.mute}}><span className="flex ac" style={{gap:6,minWidth:0}}><span style={{fontFamily:MONO}}>{new Date(s.closedAt).toLocaleDateString("en-GB",{day:"2-digit",month:"2-digit"})} {new Date(s.closedAt).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</span><span style={{color:C.text}}>{s.tableName}</span></span><span style={{fontFamily:MONO}}>{p.unit==="kg"?round2(kg)+" kg":q+"×"} · {euro(round2(amt))}</span></div>);})}</div>}
        </div>);})}</Panel>
    </div>
    <div style={{marginTop:18}}>
      <div className="flex ac jb" style={{marginBottom:8}}><Title>Paid orders</Title><span style={{fontSize:12,color:C.mute,fontFamily:MONO}}>{list.length} ticket{list.length===1?"":"s"}</span></div>
      {(()=>{
        if(list.length===0)return <Empty>No paid orders in this range.</Empty>;
        const sorted=[...list].sort((a,b)=>new Date(b.closedAt)-new Date(a.closedAt));
        const spanDays=Math.round((Date.parse(to)-Date.parse(from))/86400000)+1;
        const bucket=(arr,keyFn)=>{const m={};arr.forEach((s)=>{const k=keyFn(s);(m[k]=m[k]||[]).push(s);});return Object.keys(m).sort().reverse().map((k)=>({key:k,items:m[k]}));};
        const sumOf=(arr)=>round2(arr.reduce((a,x)=>a+x.total,0));
        const dayOf=(s)=>bizDay(s.closedAt);
        const distinctDays=new Set(sorted.map(dayOf)).size;
        const orderCard=(s)=>{const opn=!!openIds[s.id];const mc=s.method==="cash"?C.green:s.method==="split"?C.violet:C.amber;return(
          <div key={s.id} style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:12,overflow:"hidden"}}>
            <button className="btn" onClick={()=>setOpenIds((o)=>({...o,[s.id]:!o[s.id]}))} style={{width:"100%",textAlign:"left",background:"transparent",border:"none",color:C.text,cursor:"pointer",padding:"11px 13px",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontFamily:MONO,fontSize:12,color:C.mute,width:88}}>{new Date(s.closedAt).toLocaleDateString("en-GB",{day:"2-digit",month:"2-digit"})} {new Date(s.closedAt).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</span>
              <span style={{fontWeight:800,fontSize:14,minWidth:52}}>{s.tableName}</span>
              <span className="flex ac" style={{gap:5,flex:1,minWidth:0,fontSize:12,color:C.mute}}><span style={{width:8,height:8,borderRadius:8,background:wColor(s.waiterId)}}/>{wLabel(s.waiterId)||"—"}</span>
              <span style={{fontSize:10,fontWeight:800,color:mc,border:`1px solid ${mc}`,borderRadius:5,padding:"1px 6px",textTransform:"uppercase"}}>{s.method==="card"?"Card":s.method==="split"?"Split":"Cash"}</span>
              <span style={{fontFamily:MONO,fontWeight:800,color:C.amber,fontSize:15,minWidth:60,textAlign:"right"}}>{euro(s.total)}</span>
              <span style={{color:C.subtle,transform:opn?"rotate(90deg)":"none",transition:"transform .12s",display:"flex"}}><Ico n="right" size={16}/></span>
            </button>
            {opn&&<div style={{padding:"0 13px 12px",borderTop:`1px solid ${C.line}`}}>

              {s.payments&&s.payments.length>0&&<div style={{borderTop:`1px dashed ${C.line}`,paddingTop:6}}>{s.payments.map((p,i)=>(<div key={i} className="flex ac jb" style={{fontSize:12,color:C.mute,padding:"1px 0"}}><span className="flex ac" style={{gap:5}}><Ico n={p.method==="card"?"card":"cash"} size={12} color={C.mute}/>{p.method==="card"?"Card/POS":"Cash"}{p.lines?" · items":""}</span><span style={{fontFamily:MONO}}>{euro(p.amount)}</span></div>))}</div>}
            </div>}
          </div>);};
        const GH=({id,label,count,sum,children})=>{const on=!!gexp[id];return(<div style={{border:`1px solid ${C.line}`,borderRadius:12,overflow:"hidden",marginBottom:8}}>
          <button className="btn" onClick={()=>setGexp((g)=>({...g,[id]:!g[id]}))} style={{width:"100%",display:"flex",alignItems:"center",gap:10,background:C.panel2,border:"none",padding:"11px 13px",color:C.text,cursor:"pointer"}}>
            <span style={{flex:1,textAlign:"left",fontWeight:700,fontSize:13.5}}>{label}</span><span style={{fontSize:11.5,color:C.mute,fontFamily:MONO}}>{count} tx</span><span style={{fontFamily:MONO,fontWeight:800,color:C.amber,fontSize:14}}>{euro(sum)}</span><span style={{color:C.subtle,transform:on?"rotate(90deg)":"none",transition:"transform .12s",display:"flex"}}><Ico n="right" size={16}/></span></button>
          {on&&<div style={{padding:"8px 10px",display:"grid",gap:8}}>{children}</div>}
        </div>);};
        const dayGroups=(items,pfx)=>bucket(items,dayOf).map((dg)=>(<GH key={dg.key} id={pfx+"d"+dg.key} label={fmtDayLabel(dg.key)} count={dg.items.length} sum={sumOf(dg.items)}>{dg.items.map(orderCard)}</GH>));
        if(distinctDays<=1)return <div style={{display:"grid",gap:8}}>{sorted.map(orderCard)}</div>;
        if(spanDays<=8)return <div>{dayGroups(sorted,"")}</div>;
        if(spanDays<=45)return <div>{bucket(sorted,(s)=>weekStartKey(dayOf(s))).map((wk)=>(<GH key={wk.key} id={"w"+wk.key} label={"Week of "+fmtDShort(wk.key)} count={wk.items.length} sum={sumOf(wk.items)}>{dayGroups(wk.items,"w"+wk.key)}</GH>))}</div>;
        return <div>{bucket(sorted,(s)=>dayOf(s).slice(0,7)).map((mo)=>(<GH key={mo.key} id={"m"+mo.key} label={fmtMonthLabel(mo.key)} count={mo.items.length} sum={sumOf(mo.items)}>{bucket(mo.items,(s)=>weekStartKey(dayOf(s))).map((wk)=>(<GH key={wk.key} id={"m"+mo.key+"w"+wk.key} label={"Week of "+fmtDShort(wk.key)} count={wk.items.length} sum={sumOf(wk.items)}>{dayGroups(wk.items,"m"+mo.key+"w"+wk.key)}</GH>))}</GH>))}</div>;
      })()}
    </div>
  </div>);
}

            <a className="btn" href="/api/export" style={{...SMALL,display:"flex",alignItems:"center",gap:7,background:C.panel3,color:C.text,textDecoration:"none",cursor:"pointer"}}><Ico n="save" size={15}/> Export data file</a>
            <label className="btn" style={{...SMALL,display:"flex",alignItems:"center",gap:7,background:C.panel3,color:C.text,cursor:"pointer"}}><Ico n="undo" size={15}/> Import data file…
              <input type="file" accept="application/json,.json" style={{display:"none"}} onChange={(e)=>{const f=e.target.files&&e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=async()=>{try{const data=JSON.parse(rd.result);if(confirm("Import this file? It replaces ALL current data on this computer."))(async()=>{const r=await act("importData",{data});if(r&&!r.ok)alert("Import failed: "+(r.error||"unknown"));})();}catch{alert("That doesn't look like a valid Kafeneío data file.");}};rd.readAsText(f);e.target.value="";}}/></label>
          </div>
          <SettingRow label="Automatic backups while running" field="autoBackup" on={s.autoBackup} act2="setBackup"/>
          <div className="flex ac jb" style={{padding:"11px 0",borderBottom:`1px solid ${C.line}`}}><span style={{fontSize:13.5}}>Backup every (minutes)</span><input type="number" min="1" defaultValue={s.backupIntervalMin||10} onBlur={(e)=>act("setBackup",{backupIntervalMin:Math.max(1,parseInt(e.target.value)||10)})} style={{...INP,width:70,textAlign:"center"}}/></div>
          <div className="flex ac jb" style={{padding:"11px 0",borderBottom:`1px solid ${C.line}`}}><span style={{fontSize:13.5}}>Keep history for (months)</span><input type="number" min="1" defaultValue={s.backupKeepMonths||12} onBlur={(e)=>act("setBackup",{backupKeepMonths:Math.max(1,parseInt(e.target.value)||12)})} style={{...INP,width:70,textAlign:"center"}}/></div>
          <div style={{padding:"11px 0 4px"}}><label style={{...LBL,display:"block",marginBottom:4}}>Cloud / off-machine backup folder</label>
            <input defaultValue={s.backupDir||""} onBlur={(e)=>act("setBackup",{backupDir:e.target.value.trim()})} placeholder="e.g. C:\\Users\\you\\Dropbox\\KafeneioBackup" style={{...INP,width:"100%",fontFamily:MONO,fontSize:12}}/>
            <div style={{color:C.subtle,fontSize:11.5,marginTop:6}}>Data lives in a local <b>SQLite database</b> (crash-safe, works fully offline). Backups are <b>compressed (.gz)</b> and <b>self-cleaning</b>: every snapshot in the last 24h is kept, then one per day for two weeks, then one per month — anything past “keep history” months is deleted automatically, so the folder never grows out of control. Point the folder above at <b>Dropbox / Google&nbsp;Drive / OneDrive</b> (or USB / network) for an off-machine copy. <b>Export</b> saves everything to one file; <b>Import</b> loads it back on any machine to return exactly to that point.</div>
          </div>
        </React.Fragment>);})()}
      </div>
      {rst!==null&&<RestoreModal backups={rst} onClose={()=>setRst(null)} onPick={async(b)=>{if(confirm("Restore this backup? It replaces the current data on this computer.")){const r=await act("restoreBackup",{dir:b.dir,name:b.name});setRst(null);if(r&&!r.ok)alert("Restore failed: "+(r.error||"unknown"));}}}/>}
      <div style={{...CARD,display:"grid",gap:10,gridTemplateColumns:mob?"1fr":"1fr 1fr"}}>
        <ShopField label="Business name" field="name" val={state.shop.name}/>
        <ShopField label="Address" field="address" val={state.shop.address}/>
        <ShopField label="ΑΦΜ / VAT" field="vat" val={state.shop.vat}/>
        <ShopField label="Tax office (ΔΟΥ)" field="taxOffice" val={state.shop.taxOffice}/>
        <ShopField label="Phone" field="phone" val={state.shop.phone}/>
        <div><label style={{...LBL,display:"block",marginBottom:2}}>Business day starts at</label>
          <select value={state.shop.dayStart!=null?state.shop.dayStart:5} onChange={(e)=>act("setShop",{dayStart:parseInt(e.target.value)})} style={{...INP,width:"100%"}}>{Array.from({length:12},(_,h)=>h).map((h)=><option key={h} value={h}>{String(h).padStart(2,"0")}:00</option>)}</select></div>
      </div>
      <div style={{color:C.subtle,fontSize:11.5,marginTop:6}}>Sales after midnight but before this hour count on the <b>previous</b> working day — e.g. a 02:30 sale with a 05:00 start belongs to the day before. Shop name, address & ΑΦΜ print on the customer receipt.</div>
    </div>
    {optProd&&<ProductOptionsModal product={optProd} onClose={()=>setOptProd(null)}/>}
  </div>);
}

/* ---------- shared ---------- */
function Overlay({children,center,onBackdrop}){return(<div onClick={onBackdrop?(e)=>{if(e.target===e.currentTarget)onBackdrop();}:undefined} style={{position:"fixed",inset:0,zIndex:20,background:"rgba(10,8,6,.72)",display:center?"grid":"block",placeItems:center?"center":undefined,padding:center?12:0}}>{center?children:<div style={{position:"absolute",inset:0,maxWidth:1100,margin:"0 auto"}}>{children}</div>}</div>);}
function Center({children}){return<div style={{minHeight:"100vh",display:"grid",placeItems:"center",background:C.ink,color:C.text,fontFamily:SANS,padding:20}}>{children}</div>;}
const Title=({children})=><h2 style={{fontSize:13,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",color:C.mute,margin:"0 0 4px"}}>{children}</h2>;
const P=({children})=><p style={{color:C.mute,fontSize:12.5,margin:"6px 0 16px",maxWidth:640}}>{children}</p>;
const Empty=({children})=><div style={{background:C.panel,border:`1px dashed ${C.line}`,borderRadius:12,padding:30,textAlign:"center",color:C.subtle,fontSize:13}}>{children}</div>;
function Dot({pid}){return<span title={pName(pid)} style={{width:8,height:8,borderRadius:8,background:pColor(pid),flexShrink:0,display:"inline-block"}}/>;}
function ShopField({label,field,val}){return(<div><label style={{...LBL,display:"block",marginBottom:2}}>{label}</label><input defaultValue={val||""} onBlur={(e)=>act("setShop",{[field]:e.target.value})} style={{...INP,width:"100%"}}/></div>);}
function SettingRow({label,field,on,act2}){return(<button className="btn" onClick={()=>act(act2||"setSetting",{[field]:!on})} style={{display:"flex",alignItems:"center",gap:12,width:"100%",background:"transparent",border:"none",padding:"11px 0",cursor:"pointer",borderBottom:`1px solid ${C.line}`,color:C.text,textAlign:"left"}}><span style={{flex:1,fontSize:13.5}}>{label}</span><span style={{width:44,height:24,borderRadius:24,background:on?C.green:C.line,position:"relative",flexShrink:0,transition:"background .12s"}}><span style={{position:"absolute",top:2,left:on?22:2,width:20,height:20,borderRadius:20,background:"#fff",transition:"left .12s"}}/></span></button>);}
const ICON={width:36,height:36,borderRadius:9,border:"none",background:C.panel2,display:"grid",placeItems:"center",color:C.text};
const QTY={width:30,height:30,borderRadius:7,border:`1px solid ${C.line}`,background:C.panel2,display:"grid",placeItems:"center",color:C.text,flexShrink:0};
const BIG={display:"flex",alignItems:"center",justifyContent:"center",gap:8,borderRadius:10,padding:"12px 14px",fontSize:13.5,fontFamily:SANS};
const SMALL={display:"flex",alignItems:"center",borderRadius:20,padding:"8px 14px",fontSize:13,fontFamily:SANS,border:"none"};
const CHIP={borderRadius:8,padding:"6px 12px",fontSize:12.5,fontWeight:700,border:"none",cursor:"pointer"};
const INP={background:C.panel2,border:`1px solid ${C.line}`,borderRadius:8,padding:"9px 11px",color:C.text,fontSize:13,fontFamily:SANS,outline:"none"};
const CARD={background:C.panel,borderRadius:12,border:`1px solid ${C.line}`,padding:12,margin:"8px 0 16px"};
const ROW={gap:8,background:C.panel,borderRadius:8,padding:"8px 10px",border:`1px solid ${C.line}`};
const LBL={fontSize:11,color:C.mute};

class ErrorBoundary extends React.Component{constructor(p){super(p);this.state={err:null};}static getDerivedStateFromError(e){return{err:e};}componentDidCatch(e){console.error(e);}render(){if(this.state.err)return(<Center><div style={{textAlign:"center",maxWidth:320}}><div style={{width:48,height:48,borderRadius:14,background:C.panel2,display:"grid",placeItems:"center",margin:"0 auto 14px"}}><Ico n="x" size={24} color={C.red}/></div><div style={{fontWeight:800,fontSize:16,marginBottom:6}}>Something glitched</div><div style={{color:C.mute,fontSize:13,marginBottom:16}}>The screen hit an error. Reload to continue — your data is safe on the server.</div><button className="btn" onClick={()=>location.reload()} style={{...BIG,justifyContent:"center",background:C.amber,color:C.ink,border:"none",fontWeight:800,cursor:"pointer"}}>Reload</button></div></Center>);return this.props.children;}}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
